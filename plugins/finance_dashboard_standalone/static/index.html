<!DOCTYPE html>
<html lang="zh-TW" class="dark h-full bg-[#05050a]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unified Quant & Finance Terminal (Standalone)</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            border: 'rgba(255, 255, 255, 0.08)',
            background: '#05050a',
            foreground: '#e2e8f0',
            card: 'rgba(10, 10, 20, 0.45)',
          }
        }
      }
    }
  </script>

  <!-- Google Fonts Outfit & JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Marked.js CDN (Markdown parser) -->
  <script src="https://unpkg.com/marked@12.0.0/marked.min.js"></script>

  <!-- React & Babel CDN (Zero Build runtime compiler) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background-color: #030307;
      background-image: 
        radial-gradient(circle at 80% 10%, rgba(6, 182, 212, 0.12) 0%, transparent 40%),
        radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 40%);
      background-attachment: fixed;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
    /* Dynamic Glowing Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(6, 182, 212, 0.2);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(6, 182, 212, 0.55);
      box-shadow: 0 0 10px rgba(6, 182, 212, 0.4);
    }
    
    /* Elegant Laser Scan & Neon animations */
    @keyframes laserSweep {
      0% { left: -100%; }
      100% { left: 150%; }
    }
    .laser-btn {
      position: relative;
      overflow: hidden;
    }
    .laser-btn::after {
      content: '';
      position: absolute;
      top: 0;
      height: 100%;
      width: 60px;
      background: linear-gradient(
        to right,
        rgba(255, 255, 255, 0) 0%,
        rgba(255, 255, 255, 0.75) 50%,
        rgba(255, 255, 255, 0) 100%
      );
      transform: skewX(-25deg);
      left: -100%;
      pointer-events: none;
      transition: none;
    }
    .laser-btn:hover::after {
      animation: laserSweep 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    
    /* Frosted Panels and Glassmorphism */
    .frosted-panel {
      background: rgba(10, 11, 20, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .frosted-panel:hover {
      border-color: rgba(6, 182, 212, 0.22);
      box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.5), 0 0 20px rgba(6, 182, 212, 0.08);
      transform: translateY(-2px);
    }
    
    /* Ripple & Typing Animations */
    @keyframes pulseRipple {
      0% { transform: scale(0.95); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 0.3; }
      100% { transform: scale(1.3); opacity: 0; }
    }
    .ripple-ring {
      animation: pulseRipple 2s cubic-bezier(0.2, 0.8, 0.2, 1) infinite;
    }
    
    @keyframes glowBreathe {
      0%, 100% { box-shadow: 0 0 15px rgba(6, 182, 212, 0.15); border-color: rgba(6, 182, 212, 0.25); }
      50% { box-shadow: 0 0 25px rgba(6, 182, 212, 0.35); border-color: rgba(6, 182, 212, 0.5); }
    }
    .glow-breathe-cyan {
      animation: glowBreathe 3s ease-in-out infinite;
    }
  </style>
</head>
<body class="h-full text-slate-200">

  <!-- React Root -->
  <div id="root" class="h-full"></div>

  <!-- React App Core using Babel (ES6 React script) -->
  <script type="text/babel" src="/app.js"></script>

</body>
</html>
